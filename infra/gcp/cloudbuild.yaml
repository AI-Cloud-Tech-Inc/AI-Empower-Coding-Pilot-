# Cloud Build CI/CD pipeline for AI-Empower-Coding-Pilot
#
# Trigger this build by connecting your GitHub repo in Cloud Build triggers:
#   - Push to main   → deploy to dev
#   - Tag v*-staging → deploy to staging
#   - Tag v*         → deploy to prod
#
# Required substitutions (set in trigger config):
#   _ENVIRONMENT  — dev | staging | prod
#   _REGION       — e.g. us-central1
#

substitutions:
  _ENVIRONMENT: "dev"
  _REGION: "us-central1"
  _REGISTRY: "${_REGION}-docker.pkg.dev/${PROJECT_ID}/ai-empower-${_ENVIRONMENT}"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ---- 1. Run backend linting & tests ----
  - id: backend-lint-test
    name: "python:3.11-slim"
    entrypoint: bash
    args:
      - -c
      - |
        pip install -q -r requirements.txt ruff pytest pytest-asyncio pytest-cov
        ruff check backend/ tests/
        ruff format --check backend/ tests/
        pytest tests/ -v --tb=short

  # ---- 2. Run frontend type check & build ----
  - id: frontend-build-check
    name: "node:20-alpine"
    entrypoint: sh
    args:
      - -c
      - |
        cd frontend
        npm ci
        npx tsc --noEmit
        npm run build
    waitFor: ["-"]

  # ---- 3. Build backend Docker image ----
  - id: build-backend
    name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "${_REGISTRY}/backend:${SHORT_SHA}"
      - -t
      - "${_REGISTRY}/backend:latest"
      - -f
      - docker/Dockerfile.backend
      - --target=production
      - .
    waitFor:
      - backend-lint-test

  # ---- 4. Build frontend Docker image ----
  - id: build-frontend
    name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "${_REGISTRY}/frontend:${SHORT_SHA}"
      - -t
      - "${_REGISTRY}/frontend:latest"
      - -f
      - docker/Dockerfile.frontend
      - --target=production
      - .
    waitFor:
      - frontend-build-check

  # ---- 5. Push backend image ----
  - id: push-backend
    name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - --all-tags
      - "${_REGISTRY}/backend"
    waitFor:
      - build-backend

  # ---- 6. Push frontend image ----
  - id: push-frontend
    name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - --all-tags
      - "${_REGISTRY}/frontend"
    waitFor:
      - build-frontend

  # ---- 7. Deploy backend to Cloud Run ----
  - id: deploy-backend
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - "ai-empower-backend-${_ENVIRONMENT}"
      - --image=${_REGISTRY}/backend:${SHORT_SHA}
      - --region=${_REGION}
      - --quiet
    waitFor:
      - push-backend

  # ---- 8. Deploy frontend to Cloud Run ----
  - id: deploy-frontend
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - "ai-empower-frontend-${_ENVIRONMENT}"
      - --image=${_REGISTRY}/frontend:${SHORT_SHA}
      - --region=${_REGION}
      - --quiet
    waitFor:
      - push-frontend

  # ---- 9. Verify backend health ----
  - id: verify-health
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$(gcloud run services describe ai-empower-backend-${_ENVIRONMENT} \
          --region=${_REGION} --format='value(status.url)')
        echo "Backend URL: $${BACKEND_URL}"
        for i in 1 2 3 4 5; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$${BACKEND_URL}/api/health")
          if [ "$$STATUS" = "200" ]; then
            echo "Health check passed!"
            exit 0
          fi
          echo "Attempt $$i: status=$$STATUS, retrying in 10s..."
          sleep 10
        done
        echo "Health check failed after 5 attempts"
        exit 1
    waitFor:
      - deploy-backend
      - deploy-frontend

images:
  - "${_REGISTRY}/backend:${SHORT_SHA}"
  - "${_REGISTRY}/backend:latest"
  - "${_REGISTRY}/frontend:${SHORT_SHA}"
  - "${_REGISTRY}/frontend:latest"

timeout: "1800s"
